services:
  - type: web
    name: profbetgeng-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "0.3.0"
      - key: AUTH_ENABLED
        value: "true"
      - key: BATCH_ENABLED
        value: "false"
      - key: ADMIN_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
