[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --disable-warnings
markers =
    m1: Milestone 1 (Parsing)
    m2: Milestone 2 (Conversion)
    m3: Milestone 3 (Auth & AI)
    m4: Milestone 4 (Batch)
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
